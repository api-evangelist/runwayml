description: >-
  FinOps view of Runway API spend. The Runway developer API is billed on prepaid
  credits (roughly $0.01 per credit) consumed per generation task. Cost is driven
  by output length and model: video is billed per second (Gen-4 Turbo ~5
  credits/sec, Aleph video-to-video ~28 credits/sec), images per image (Gen-4
  Image ~5 credits at 720p), speech per character, and upscales per output frame.
  The dominant cost lever is the number and duration of video generations and the
  model chosen. Enterprise agreements cover volume credit pricing and higher
  limits.
notes: >-
  Per-model credit rates change over time; verify on Runway's API pricing guide.
  Because pricing is per output second/frame/image, cost is highly sensitive to
  clip duration, resolution, and model - model selection and duration caps are the
  primary optimization levers.

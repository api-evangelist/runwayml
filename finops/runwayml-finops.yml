meters:
- name: video_seconds
  description: Seconds of video generated, billed in credits per second by model (image-to-video, video-to-video, character performance).
  unit: seconds
  aggregation: sum
  dimensions:
  - organization
  - model
- name: images
  description: Images generated by the text-to-image models, billed in credits per image by resolution.
  unit: images
  aggregation: sum
  dimensions:
  - organization
  - model
- name: speech_characters
  description: Characters synthesized by text-to-speech, billed at 1 credit per 50 characters.
  unit: characters
  aggregation: sum
  dimensions:
  - organization
- name: upscale_frames
  description: Output frames produced by video upscaling, billed per frame.
  unit: frames
  aggregation: sum
  dimensions:
  - organization
- name: credits
  description: Prepaid credits consumed across all generation tasks; roughly $0.01 per credit.
  unit: credits
  aggregation: sum
  dimensions:
  - organization
  - model
principles:
- name: Visibility
  description: Track credit burn per model and per organization; tag tasks by feature so video, image, speech, and upscale spend are separable.
- name: Allocation
  description: Use separate developer organizations or API keys per product/team so credit consumption maps to cost centers.
- name: Optimization
  description: Cap clip duration and resolution, prefer Gen-4 Turbo / Gen-4 Image Turbo for cheaper output, reserve Aleph and upscales for final renders, and cache generated assets to avoid regeneration.
- name: Accountability
  description: Monitor the Organization API credit balance before batch jobs; review monthly credit purchases against generated-asset value.

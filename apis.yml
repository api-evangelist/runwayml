aid: runwayml
url: https://raw.githubusercontent.com/api-evangelist/runwayml/refs/heads/main/apis.yml
name: Runway
kind: company
description: Runway (RunwayML) is a generative AI media platform whose developer API
  turns text, images, and video into new video, images, speech, and character
  performances. The REST API at https://api.dev.runwayml.com/v1 exposes Runway's
  Gen-4 and Gen-4 Turbo video models, Gen-4 Image text-to-image, the Aleph
  video-to-video editing model, and Act character performance, all through an
  asynchronous create-task-then-poll pattern authenticated with a Bearer API
  secret and a dated X-Runway-Version header. Access is API-key based via a
  developer organization; usage is billed in credits at roughly $0.01 per credit.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Video Generation
- AI Video
- Generative AI
- Text-to-Video
- Image-to-Video
- Text-to-Image
- Video-to-Video
created: '2026-07-11'
modified: '2026-07-11'

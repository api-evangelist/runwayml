  description: Generate video from a starting (and optional ending) image and a text
    prompt using Runway's Gen-4 Turbo and Gen-4.5 models (and the deprecated Gen-3
    Alpha Turbo). Submitting a POST creates an asynchronous task; the returned task
    id is polled on the Tasks API until the rendered video URL is ready.
